<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Contact — Frolab</title>
<meta name="description" content="Get in touch with Frolab to start a project or ask a question." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./styles.css" />
</head>
<body data-page="contact">
<div id="site-header"></div>
<main>
  <section class="page-hero" style="padding-bottom:30px">
    <div class="container">
      <span class="kicker reveal" data-anim="fade">Contact</span>
      <h1 class="reveal" data-anim="up" style="--d:.06s">Let's Turn Traffic<br>Into Revenue</h1>
    </div>
  </section>

  <section class="section" style="padding-top:10px">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info reveal" data-anim="left">
          <h2 class="h2">Start a conversation</h2>
          <p>Tell us a little about your project. We reply to every serious enquiry within 48 hours.</p>
          <div class="row">
            <a href="mailto:hello@frolab.studio">hello@frolab.studio</a>
            <a href="https://wa.me/8801322635808" target="_blank" rel="noopener">WhatsApp +880 1322 635808</a>
          </div>
        </div>

        <form class="contact reveal" data-anim="up" id="contactForm" novalidate>
          <div><label for="name">Name</label><input id="name" name="name" type="text" required placeholder="Your name"></div>
          <div><label for="email">Email</label><input id="email" name="email" type="email" required placeholder="you@company.com"></div>
          <div><label for="budget">Budget range</label><input id="budget" name="budget" type="text" placeholder="e.g. $5k–$15k"></div>
          <div><label for="message">Project details</label><textarea id="message" name="message" required placeholder="What are you building, and what does success look like?"></textarea></div>
          <button class="btn btn-dark" type="submit" style="align-self:flex-start">Send Message <span class="arrow-circle">↗</span></button>
        </form>
      </div>
    </div>
  </section>
</main>
<div id="site-footer"></div>
<script src="./app.js"></script>
</body>
</html>
