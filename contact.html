<head>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Brittman">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact — Request a Workforce Consultation | Brittman">

</head>
<body data-page="contact">
<div id="site-header"></div>
<main>
  <section class="page-hero" style="padding-bottom:30px">
    <div class="container">
      <span class="kicker reveal" data-anim="fade">Contact</span>
      <h1 class="reveal" data-anim="up" style="--d:.06s">Let's Build a Stronger<br>Workforce Together</h1>
    </div>
  </section>

  <section class="section" style="padding-top:10px">
    <div class="container">
      <div class="contact-grid">
        <div class="contact-info reveal" data-anim="left">
          <h2 class="h2">Talk to our team</h2>
          <p>Tell us about your workforce, payroll or compliance needs. We respond to every enterprise enquiry promptly.</p>
          <div class="row">
            <a href="mailto:info@brittman.com">info@brittman.com</a>
            <a href="tel:+912265300998">Mumbai · +91 22 6530 0998</a>
            <a href="tel:+917967777905">Ahmedabad · +91 79 6777 7905</a>
          </div>
        </div>

        <form class="contact reveal" data-anim="up" id="contactForm" novalidate>
          <div><label for="name">Name</label><input id="name" name="name" type="text" required placeholder="Your name"></div>
          <div><label for="email">Work email</label><input id="email" name="email" type="email" required placeholder="you@company.com"></div>
          <div><label for="budget">Service of interest</label><input id="budget" name="budget" type="text" placeholder="e.g. Staffing, Payroll, Compliance"></div>
          <div><label for="message">Your requirement</label><textarea id="message" name="message" required placeholder="Roles, locations, headcount and timelines"></textarea></div>
          <button class="btn btn-dark" type="submit" style="align-self:flex-start">Send Enquiry <span class="arrow-circle">↗</span></button>
        </form>
      </div>
    </div>
  </section>
</main>
<div id="site-footer"></div>
<script src="./app.js"></script>
</body>
</html>
